<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1C2820">
<title>Camp Level</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%231C2820'/%3E%3Ccircle cx='16' cy='16' r='11' fill='none' stroke='%23D6C9AE' stroke-width='2'/%3E%3Ccircle cx='19' cy='13' r='4' fill='%23C1652F'/%3E%3C/svg%3E">
<style>
  :root{
    --ground:#1C2820; --panel:#243428; --edge:#3A4A3E; --grid:#33422F;
    --cream:#D6C9AE; --cream-bright:#F3EBDA; --sage:#5C7A5E; --sage-mute:#7A8A6E;
    --rust:#C1652F; --rust-lt:#E8B48A; --level:#7FB088;
    --mono:ui-monospace,"SF Mono",SFMono-Regular,Menlo,Consolas,monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    background:var(--ground); color:var(--cream); font-family:var(--mono);
    display:flex; flex-direction:column; align-items:center;
    padding:max(20px,env(safe-area-inset-top)) 18px max(18px,env(safe-area-inset-bottom));
    overscroll-behavior:none; touch-action:manipulation; user-select:none; -webkit-user-select:none;
  }
  .app{width:100%; max-width:360px; display:flex; flex-direction:column; gap:14px; flex:1}
  header{display:flex; justify-content:space-between; align-items:baseline}
  header h1{font-size:13px; font-weight:500; letter-spacing:.14em; color:var(--cream)}
  #zeroStamp{font-size:11px; color:var(--sage-mute)}
  .dial-wrap{display:flex; justify-content:center}
  svg{width:min(84vw,320px); height:auto; display:block}
  .readouts{display:flex; gap:10px}
  .card{flex:1; background:var(--panel); border-radius:8px; padding:10px 12px}
  .card .lbl{font-size:11px; letter-spacing:.08em; color:var(--sage-mute); margin-bottom:2px}
  .card .deg{font-size:22px; color:var(--cream-bright); font-variant-numeric:tabular-nums}
  .card .dir{font-size:11px; letter-spacing:.06em; color:var(--rust); margin-top:2px; min-height:13px}
  .card.is-level .dir{color:var(--level)}
  .btns{display:flex; gap:10px}
  button{
    flex:1; font-family:var(--mono); font-size:12px; letter-spacing:.1em;
    background:transparent; color:var(--cream); border:1px solid var(--sage);
    border-radius:8px; padding:12px; cursor:pointer;
  }
  button:active{transform:scale(.98)}
  #holdBtn{color:var(--sage-mute); border-color:var(--grid)}
  #holdBtn.active{color:var(--ground); background:var(--cream); border-color:var(--cream)}
  footer{font-size:10.5px; line-height:1.6; color:var(--sage-mute); text-align:center; letter-spacing:.03em; margin-top:auto; padding-top:10px}
  #gate{
    position:fixed; inset:0; background:var(--ground); display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:18px; padding:32px; text-align:center; z-index:10;
  }
  #gate h1{font-size:15px; font-weight:500; letter-spacing:.18em}
  #gate p{font-size:12px; line-height:1.7; color:var(--sage-mute); max-width:280px}
  #gate button{flex:0 0 auto; padding:14px 34px}
  #gate .err{color:var(--rust); min-height:16px; font-size:11px}
  @media (prefers-reduced-motion: no-preference){
    #bubble{transition:transform .08s linear}
    #ring,#bubble,.dir,.deg{transition-property:transform,fill,stroke,color; transition-duration:.15s}
  }
</style>
</head>
<body>

<div id="gate">
  <svg width="72" height="72" viewBox="0 0 72 72" aria-hidden="true">
    <circle cx="36" cy="36" r="30" fill="none" stroke="#D6C9AE" stroke-width="2.5"/>
    <circle cx="36" cy="36" r="8" fill="none" stroke="#D6C9AE" stroke-width="1.5"/>
    <circle cx="45" cy="27" r="7" fill="#C1652F"/>
  </svg>
  <h1>CAMP LEVEL</h1>
  <p>Set the phone flat on the trailer floor, top of the phone toward the nose. Tap below to allow motion-sensor access.</p>
  <button id="startBtn">ENABLE SENSORS</button>
  <p class="err" id="gateErr"></p>
</div>

<div class="app">
  <header>
    <h1>CAMP LEVEL</h1>
    <span id="zeroStamp">NOT ZEROED</span>
  </header>

  <div class="dial-wrap">
    <svg viewBox="0 0 284 284" role="img" aria-labelledby="dialTitle">
      <title id="dialTitle">Bubble level dial</title>
      <defs><clipPath id="dialClip"><circle cx="142" cy="142" r="118"/></clipPath></defs>
      <g stroke="var(--grid)" stroke-width="1">
        <line x1="22" y1="22" x2="22" y2="262"/><line x1="62" y1="22" x2="62" y2="262"/>
        <line x1="102" y1="22" x2="102" y2="262"/><line x1="182" y1="22" x2="182" y2="262"/>
        <line x1="222" y1="22" x2="222" y2="262"/><line x1="262" y1="22" x2="262" y2="262"/>
        <line x1="22" y1="22" x2="262" y2="22"/><line x1="22" y1="62" x2="262" y2="62"/>
        <line x1="22" y1="102" x2="262" y2="102"/><line x1="22" y1="182" x2="262" y2="182"/>
        <line x1="22" y1="222" x2="262" y2="222"/><line x1="22" y1="262" x2="262" y2="262"/>
      </g>
      <g stroke="var(--grid)" stroke-width="1" stroke-dasharray="3 6">
        <line x1="22" y1="42" x2="262" y2="42"/><line x1="22" y1="82" x2="262" y2="82"/>
        <line x1="22" y1="122" x2="262" y2="122"/><line x1="22" y1="162" x2="262" y2="162"/>
        <line x1="22" y1="202" x2="262" y2="202"/><line x1="22" y1="242" x2="262" y2="242"/>
        <line x1="42" y1="22" x2="42" y2="262"/><line x1="82" y1="22" x2="82" y2="262"/>
        <line x1="122" y1="22" x2="122" y2="262"/><line x1="162" y1="22" x2="162" y2="262"/>
        <line x1="202" y1="22" x2="202" y2="262"/><line x1="242" y1="22" x2="242" y2="262"/>
      </g>
      <circle cx="142" cy="142" r="118" fill="none" stroke="var(--cream)" stroke-width="2"/>
      <circle cx="142" cy="142" r="78" fill="none" stroke="var(--sage)" stroke-width=".75"/>
      <line x1="142" y1="24" x2="142" y2="260" stroke="var(--cream)" stroke-width="1.5" clip-path="url(#dialClip)"/>
      <line x1="24" y1="142" x2="260" y2="142" stroke="var(--cream)" stroke-width="1.5" clip-path="url(#dialClip)"/>
      <circle id="ring" cx="142" cy="142" r="14" fill="var(--ground)" stroke="var(--cream)" stroke-width="1.5"/>
      <g stroke="var(--cream)" stroke-width="1.5">
        <line x1="142" y1="16" x2="142" y2="26"/><line x1="142" y1="258" x2="142" y2="268"/>
        <line x1="16" y1="142" x2="26" y2="142"/><line x1="258" y1="142" x2="268" y2="142"/>
      </g>
      <circle id="bubble" cx="142" cy="142" r="14" fill="var(--rust)" stroke="var(--rust-lt)" stroke-width="1"/>
    </svg>
  </div>

  <div class="readouts">
    <div class="card" id="rollCard">
      <div class="lbl">SIDE-SIDE</div>
      <div class="deg" id="rollDeg">0.0&deg;</div>
      <div class="dir" id="rollDir"></div>
    </div>
    <div class="card" id="pitchCard">
      <div class="lbl">NOSE-TAIL</div>
      <div class="deg" id="pitchDeg">0.0&deg;</div>
      <div class="dir" id="pitchDir"></div>
    </div>
  </div>

  <div class="btns">
    <button id="zeroBtn">ZERO</button>
    <button id="holdBtn">HOLD</button>
  </div>

  <footer>PHONE FLAT &middot; TOP TOWARD NOSE &middot; LEVEL = &plusmn;0.5&deg;</footer>
</div>

<script>
(function(){
  var FULL_SCALE = 4;            // degrees at dial edge
  var TOL = 0.5;                 // level tolerance, degrees
  var DIAL_R = 118, BUBBLE_R = 14;
  var PX_PER_DEG = (DIAL_R - BUBBLE_R) / FULL_SCALE;
  var TOL_R = TOL * PX_PER_DEG;  // ring drawn at true tolerance radius
  var ALPHA = 0.15;              // smoothing

  var raw = {b:0, g:0}, sm = {b:0, g:0}, zero = {b:0, g:0};
  var hold = false, wasLevel = false, gotData = false, primed = false;

  var $ = function(id){ return document.getElementById(id); };
  var ring = $('ring'), bubble = $('bubble');
  ring.setAttribute('r', TOL_R.toFixed(1));

  function onOrient(e){
    if (e.beta === null || e.gamma === null) return;
    raw.b = e.beta; raw.g = e.gamma;
    if (!primed){ sm.b = raw.b; sm.g = raw.g; primed = true; }
    gotData = true;
  }

  function fmt(v){
    var r = Math.round(v * 10) / 10;
    if (Object.is(r, -0)) r = 0;
    return (r > 0 ? '+' : '') + r.toFixed(1) + '\u00B0';
  }

  function render(){
    sm.b += ALPHA * (raw.b - sm.b);
    sm.g += ALPHA * (raw.g - sm.g);

    if (!hold){
      var pitch = sm.b - zero.b;   // + = nose up
      var roll  = sm.g - zero.g;   // + = curb side down (right edge low)

      // bubble floats to the high side
      var bx = Math.max(-1, Math.min(1, -roll  / FULL_SCALE));
      var by = Math.max(-1, Math.min(1, -pitch / FULL_SCALE));
      var mag = Math.sqrt(bx*bx + by*by);
      if (mag > 1){ bx /= mag; by /= mag; }
      bubble.setAttribute('transform',
        'translate(' + (bx * (DIAL_R - BUBBLE_R)).toFixed(1) + ',' +
                       (by * (DIAL_R - BUBBLE_R)).toFixed(1) + ')');

      $('rollDeg').textContent  = fmt(roll);
      $('pitchDeg').textContent = fmt(pitch);

      var rollLevel  = Math.abs(roll)  <= TOL;
      var pitchLevel = Math.abs(pitch) <= TOL;

      $('rollDir').textContent  = rollLevel  ? 'LEVEL' : (roll > 0 ? 'STREET SIDE UP' : 'CURB SIDE UP');
      $('pitchDir').textContent = pitchLevel ? 'LEVEL' : (pitch > 0 ? 'NOSE UP' : 'NOSE DOWN');
      $('rollCard').classList.toggle('is-level', rollLevel);
      $('pitchCard').classList.toggle('is-level', pitchLevel);

      var isLevel = rollLevel && pitchLevel;
      bubble.setAttribute('fill',   isLevel ? 'var(--level)' : 'var(--rust)');
      bubble.setAttribute('stroke', isLevel ? 'var(--level)' : 'var(--rust-lt)');
      ring.setAttribute('stroke',   isLevel ? 'var(--level)' : 'var(--cream)');
      if (isLevel && !wasLevel && navigator.vibrate) navigator.vibrate(60);
      wasLevel = isLevel;
    }
    requestAnimationFrame(render);
  }

  $('zeroBtn').addEventListener('click', function(){
    zero.b = sm.b; zero.g = sm.g;
    var t = new Date();
    $('zeroStamp').textContent = 'ZEROED ' +
      String(t.getHours()).padStart(2,'0') + ':' + String(t.getMinutes()).padStart(2,'0');
  });

  $('holdBtn').addEventListener('click', function(){
    hold = !hold;
    this.classList.toggle('active', hold);
    this.textContent = hold ? 'HELD' : 'HOLD';
  });

  function requestWakeLock(){
    if ('wakeLock' in navigator){
      navigator.wakeLock.request('screen').catch(function(){});
      document.addEventListener('visibilitychange', function(){
        if (document.visibilityState === 'visible')
          navigator.wakeLock.request('screen').catch(function(){});
      });
    }
  }

  $('startBtn').addEventListener('click', function(){
    var begin = function(){
      window.addEventListener('deviceorientation', onOrient);
      $('gate').style.display = 'none';
      requestWakeLock();
      requestAnimationFrame(render);
      setTimeout(function(){
        if (!gotData)
          $('zeroStamp').textContent = 'NO SENSOR DATA';
      }, 2500);
    };
    if (typeof DeviceOrientationEvent !== 'undefined' &&
        typeof DeviceOrientationEvent.requestPermission === 'function'){
      DeviceOrientationEvent.requestPermission().then(function(state){
        if (state === 'granted') begin();
        else $('gateErr').textContent = 'Permission denied. Check Settings > Safari > Motion & Orientation Access.';
      }).catch(function(){
        $('gateErr').textContent = 'Sensor request failed. Use HTTPS and Safari on iPhone.';
      });
    } else {
      begin();
    }
  });
})();
</script>
</body>
</html>
